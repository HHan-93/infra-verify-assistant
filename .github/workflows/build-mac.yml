name: Build macOS

# 수동 실행(Actions 탭의 "Run workflow") 또는 v* 태그 푸시 시 빌드
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (Universal .dmg / .zip)
        # CSC_IDENTITY_AUTO_DISCOVERY=false → 서명 없이 빌드 (Apple Developer 인증서 불필요)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      # v* 태그로 트리거된 경우, GitHub Release 에도 자동 첨부
      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
